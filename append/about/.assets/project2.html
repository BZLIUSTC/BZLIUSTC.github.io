<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片转HTML工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* 上传区域样式 */
        .upload-box {
            border: 2px dashed #409eff;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            background: #fafdff;
        }

        .upload-box:hover {
            background: #e6f7ff;
            border-color: #1890ff;
        }

        .upload-box input {
            display: none;
        }

        .upload-box p {
            color: #666;
            margin-top: 10px;
        }

        /* 预览区域 */
        .preview {
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }

        .preview img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 6px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.1);
        }

        /* 按钮样式 */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .generate-btn {
            background: #409eff;
            color: white;
        }

        .generate-btn:hover {
            background: #1890ff;
        }

        .reset-btn {
            background: #f5f5f5;
            color: #333;
        }

        .reset-btn:hover {
            background: #e5e5e5;
        }

        /* 提示文字 */
        .tips {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片转HTML网页工具</h1>

        <!-- 上传区域 -->
        <div class="upload-box" id="uploadBox">
            <input type="file" id="imageInput" accept="image/*">
            <h3>📁 点击选择图片 或 拖拽图片到此处</h3>
            <p>支持 JPG / PNG / GIF / WebP 格式</p>
        </div>

        <!-- 图片预览 -->
        <div class="preview" id="previewBox">
            <img id="previewImg" src="" alt="图片预览">
        </div>

        <!-- 操作按钮 -->
        <div class="btn-group">
            <button class="generate-btn" id="generateBtn" disabled>生成并下载HTML</button>
            <button class="reset-btn" id="resetBtn">重置</button>
        </div>

        <div class="tips">
            ✅ 纯本地运行，图片不会上传到服务器<br>
            ✅ 生成的HTML可直接双击打开，无需依赖文件<br>
            ✅ 生成的HTML包含完整图片数据，可直接分享
        </div>
    </div>

    <script>
        // 获取DOM元素
        const uploadBox = document.getElementById('uploadBox');
        const imageInput = document.getElementById('imageInput');
        const previewBox = document.getElementById('previewBox');
        const previewImg = document.getElementById('previewImg');
        const generateBtn = document.getElementById('generateBtn');
        const resetBtn = document.getElementById('resetBtn');
        let imageBase64 = ''; // 存储图片Base64编码

        // 1. 点击上传图片
        uploadBox.addEventListener('click', () => {
            imageInput.click();
        });

        // 2. 拖拽上传图片
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.style.background = '#e6f7ff';
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.style.background = '#fafdff';
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.style.background = '#fafdff';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });

        // 3. 选择文件后处理
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleImageFile(file);
        });

        // 处理图片文件（转为Base64）
        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imageBase64 = e.target.result;
                previewImg.src = imageBase64;
                previewBox.style.display = 'block';
                generateBtn.disabled = false; // 启用生成按钮
            };
            reader.readAsDataURL(file);
        }

        // 4. 生成HTML文件并下载
        generateBtn.addEventListener('click', () => {
            if (!imageBase64) return;

            // 生成HTML模板代码
            const htmlContent = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片网页</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        img { max-width: 100%; max-height: 95vh; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <img src="${imageBase64}" alt="转换后的图片">
</body>
</html>`;

            // 创建下载链接
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '图片转HTML_' + new Date().getTime() + '.html';
            a.click();

            // 释放内存
            URL.revokeObjectURL(url);
            alert('✅ HTML文件已生成并下载！');
        });

        // 5. 重置功能
        resetBtn.addEventListener('click', () => {
            imageInput.value = '';
            imageBase64 = '';
            previewBox.style.display = 'none';
            generateBtn.disabled = true;
        });
    </script>
</body>
</html>
