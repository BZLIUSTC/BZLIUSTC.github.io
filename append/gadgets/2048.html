<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        /* 合并后的 CSS 样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #faf8ef;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 460px;
            margin: 40px auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #776e65;
            font-size: 48px;
        }

        .score-container {
            background: #bbada0;
            padding: 15px 25px;
            border-radius: 6px;
            color: white;
            font-size: 18px;
        }

        #new-game {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        #new-game:hover {
            background: #7f6a56;
        }

        .grid-container {
            background: #bbada0;
            padding: 15px;
            border-radius: 6px;
        }

        .grid-row {
            display: flex;
            margin-bottom: 15px;
        }

        .grid-row:last-child {
            margin-bottom: 0;
        }

        .grid-cell {
            width: 100px;
            height: 100px;
            margin-right: 15px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .grid-cell:last-child {
            margin-right: 0;
        }

        .grid-cell[data-value="2"] {
            background: #eee4da;
        }

        .grid-cell[data-value="4"] {
            background: #ede0c8;
        }

        .grid-cell[data-value="8"] {
            background: #f2b179;
            color: white;
        }

        .grid-cell[data-value="16"] {
            background: #f59563;
            color: white;
        }

        .grid-cell[data-value="32"] {
            background: #f67c5f;
            color: white;
        }

        .grid-cell[data-value="64"] {
            background: #f65e3b;
            color: white;
        }

        .grid-cell[data-value="128"] {
            background: #edcf72;
            color: white;
            font-size: 32px;
        }

        .grid-cell[data-value="256"] {
            background: #edcc61;
            color: white;
            font-size: 28px;
        }

        .grid-cell[data-value="512"] {
            background: #edc850;
            color: white;
            font-size: 28px;
        }

        .grid-cell[data-value="1024"] {
            background: #edc53f;
            color: white;
            font-size: 24px;
        }

        .grid-cell[data-value="2048"] {
            background: #edc22e;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                Score: <span id="score">0</span>
            </div>
            <button id="new-game">New Game</button>
        </div>
        <div class="grid-container">
            <div class="grid-row">
                <div class="grid-cell" id="cell-0-0"></div>
                <div class="grid-cell" id="cell-0-1"></div>
                <div class="grid-cell" id="cell-0-2"></div>
                <div class="grid-cell" id="cell-0-3"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell" id="cell-1-0"></div>
                <div class="grid-cell" id="cell-1-1"></div>
                <div class="grid-cell" id="cell-1-2"></div>
                <div class="grid-cell" id="cell-1-3"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell" id="cell-2-0"></div>
                <div class="grid-cell" id="cell-2-1"></div>
                <div class="grid-cell" id="cell-2-2"></div>
                <div class="grid-cell" id="cell-2-3"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell" id="cell-3-0"></div>
                <div class="grid-cell" id="cell-3-1"></div>
                <div class="grid-cell" id="cell-3-2"></div>
                <div class="grid-cell" id="cell-3-3"></div>
            </div>
        </div>
    </div>

    <script>
        // 合并后的 JavaScript 游戏逻辑
        class Game2048 {
            constructor() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.init();
            }

            init() {
                // 清空网格和分数
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                document.getElementById('score').textContent = this.score;
                
                // 生成初始的两个数字
                this.addNewNumber();
                this.addNewNumber();
                this.updateView();
            }

            addNewNumber() {
                // 获取所有空单元格
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) {
                            emptyCells.push({x: i, y: j});
                        }
                    }
                }

                if (emptyCells.length > 0) {
                    // 随机选择一个空单元格
                    const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    // 90%概率生成2，10%概率生成4
                    this.grid[randomCell.x][randomCell.y] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            updateView() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.getElementById(`cell-${i}-${j}`);
                        const value = this.grid[i][j];
                        cell.textContent = value || '';
                        cell.setAttribute('data-value', value);
                    }
                }
                document.getElementById('score').textContent = this.score;
            }

            move(direction) {
                let moved = false;
                const originalGrid = JSON.stringify(this.grid);

                // 根据方向处理数组
                if (direction === 'left' || direction === 'right') {
                    for (let i = 0; i < 4; i++) {
                        let row = this.grid[i].slice();
                        if (direction === 'right') row.reverse();
                        
                        // 合并相同数字
                        let newRow = this.mergeLine(row);
                        
                        if (direction === 'right') newRow.reverse();
                        this.grid[i] = newRow;
                    }
                } else {
                    for (let j = 0; j < 4; j++) {
                        let column = this.grid.map(row => row[j]);
                        if (direction === 'down') column.reverse();
                        
                        // 合并相同数字
                        let newColumn = this.mergeLine(column);
                        
                        if (direction === 'down') newColumn.reverse();
                        for (let i = 0; i < 4; i++) {
                            this.grid[i][j] = newColumn[i];
                        }
                    }
                }

                // 检查是否有移动
                if (originalGrid !== JSON.stringify(this.grid)) {
                    this.addNewNumber();
                    this.updateView();
                    
                    // 检查游戏是否结束
                    if (this.isGameOver()) {
                        setTimeout(() => {
                            alert('Game Over! Your score: ' + this.score);
                        }, 300);
                    }
                }
            }

            mergeLine(line) {
                // 移除空单元格
                let newLine = line.filter(num => num !== 0);
                
                // 合并相同数字
                for (let i = 0; i < newLine.length - 1; i++) {
                    if (newLine[i] === newLine[i + 1]) {
                        newLine[i] *= 2;
                        this.score += newLine[i];
                        newLine.splice(i + 1, 1);
                    }
                }
                
                // 填充0
                while (newLine.length < 4) {
                    newLine.push(0);
                }
                
                return newLine;
            }

            isGameOver() {
                // 检查是否有空单元格
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) return false;
                    }
                }

                // 检查是否有可合并的数字
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (this.grid[i][j] === this.grid[i][j + 1]) return false;
                        if (this.grid[j][i] === this.grid[j + 1][i]) return false;
                    }
                }

                return true;
            }
        }

        // 初始化游戏
        const game = new Game2048();

        // 键盘事件监听
        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowLeft':
                    game.move('left');
                    break;
                case 'ArrowRight':
                    game.move('right');
                    break;
                case 'ArrowUp':
                    game.move('up');
                    break;
                case 'ArrowDown':
                    game.move('down');
                    break;
            }
        });

        // 新游戏按钮事件监听
        document.getElementById('new-game').addEventListener('click', () => {
            game.init();
        });
    </script>
</body>
</html>
