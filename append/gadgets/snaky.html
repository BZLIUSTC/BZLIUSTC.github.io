<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.dark {
            background: #1a1a1a;
        }

        .game-container {
            position: relative;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        #gameCanvas {
            display: block;
            background: #ffffff;
        }

        body.dark #gameCanvas {
            background: #121212;
        }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .theme-btn, .difficulty-select {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background: #4CAF50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .theme-btn:hover, .difficulty-select:hover {
            background: #45a049;
        }

        .difficulty-select {
            background: #2196F3;
        }

        /* 分数面板 */
        .score-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border-radius: 4px;
        }

        body.dark .score-panel {
            color: #fff;
            background: rgba(0,0,0,0.6);
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            z-index: 20;
            display: none;
        }

        body.dark .game-over-modal {
            background: #2a2a2a;
            color: white;
        }

        .game-over-modal h2 {
            margin-bottom: 20px;
            color: #f44336;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .restart-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- 左上角控制区 -->
        <div class="control-panel">
            <button class="theme-btn" id="themeBtn">🌙 暗黑模式</button>
            <select class="difficulty-select" id="difficultySelect">
                <option value="easy">简单</option>
                <option value="normal" selected>普通</option>
                <option value="hard">困难</option>
            </select>
        </div>

        <!-- 右上角分数栏 -->
        <div class="score-panel" id="scorePanel">
            击杀: 0 | 长度: 10
        </div>

        <!-- 游戏结束弹窗 -->
        <div class="game-over-modal" id="gameOverModal">
            <h2>游戏结束</h2>
            <p id="finalStats">击杀: 0 | 长度: 10</p>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const themeBtn = document.getElementById('themeBtn');
        const difficultySelect = document.getElementById('difficultySelect');
        const scorePanel = document.getElementById('scorePanel');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalStats = document.getElementById('finalStats');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏配置【修改：身体放大1.5倍、超大世界地图3.5倍视口】
        const config = {
            baseGrid: 10,
            gridSize: 15,          // 原10→15，身体放大1.5倍
            worldScale: 3.5,       // 世界地图是屏幕的3.5倍长宽
            playerSpeed: 2.2,
            aiSpeed: 1.9,
            foodCount: 70,
            baseAiCount: 6,        // 基础AI数量，保证画面常驻3~4条
            aiColors: [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'
            ],
            playerColor: "#000000",
            // AI智能参数
            aiChasePlayerRate: 0.28,    // 概率追杀玩家
            aiChaseOtherRate: 0.18,     // 概率追杀其他AI
            aiEatFoodPriority: 0.54     // 找食物权重
        };

        // 世界尺寸
        const WORLD_W = canvas.width * config.worldScale;
        const WORLD_H = canvas.height * config.worldScale;

        // 游戏状态
        let gameState = {
            isDark: false,
            difficulty: 'normal',
            isGameOver: false,
            player: null,
            aiSnakes: [],
            foods: [],
            killedCount: 0,
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2,
            // 相机偏移：世界坐标→屏幕坐标
            camX: 0,
            camY: 0
        };

        // 蛇类
        class Snake {
            constructor(x, y, color, isPlayer = false) {
                this.segments = [];
                this.color = color;
                this.isPlayer = isPlayer;
                this.direction = { x: 1, y: 0 };
                this.speed = isPlayer ? config.playerSpeed : config.aiSpeed;
                this.growQueue = 0;

                // 初始长度10节
                for (let i = 0; i < 10; i++) {
                    this.segments.push({ x: x - i * config.gridSize, y });
                }
            }

            move(allSnakes, foods, playerSnake) {
                const head = { ...this.segments[0] };
                // 玩家鼠标定向
                if (this.isPlayer) {
                    const dx = gameState.mouseX - canvas.width / 2;
                    const dy = gameState.mouseY - canvas.height / 2;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 5) {
                        this.direction.x = dx / dist;
                        this.direction.y = dy / dist;
                    }
                } else {
                    // AI智能决策：追玩家/追敌人/吃食物/随机
                    this.aiLogic(allSnakes, foods, playerSnake);
                }
                head.x += this.direction.x * this.speed;
                head.y += this.direction.y * this.speed;

                // 超大世界不循环边界
                head.x = Math.max(20, Math.min(WORLD_W - 20, head.x));
                head.y = Math.max(20, Math.min(WORLD_H - 20, head.y));

                this.segments.unshift(head);
                if (this.growQueue > 0) {
                    this.growQueue--;
                } else {
                    this.segments.pop();
                }
                return head;
            }

            // AI智能逻辑
            aiLogic(allSnakes, foods, playerSnake) {
                const head = this.segments[0];
                let targetX = head.x, targetY = head.y;
                const rand = Math.random();

                // 1.概率追杀玩家
                if (rand < config.aiChasePlayerRate) {
                    targetX = playerSnake.segments[0].x;
                    targetY = playerSnake.segments[0].y;
                }
                // 2.概率追杀附近其他AI
                else if (rand < config.aiChasePlayerRate + config.aiChaseOtherRate) {
                    let minD = 99999;
                    allSnakes.forEach(s=>{
                        if(s === this) return;
                        const d = Math.hypot(s.segments[0].x-head.x, s.segments[0].y-head.y);
                        if(d < minD){ minD=d; targetX=s.segments[0].x; targetY=s.segments[0].y; }
                    })
                }
                // 3.优先搜寻附近食物（包含死亡蛇掉落的食物）
                else if (rand < config.aiChasePlayerRate + config.aiChaseOtherRate + config.aiEatFoodPriority) {
                    let minD = 99999;
                    foods.forEach(fd=>{
                        const d = Math.hypot(fd.x-head.x, fd.y-head.y);
                        if(d < minD){ minD=d; targetX=fd.x; targetY=fd.y; }
                    })
                }
                // 4.随机漫游
                else {
                    if(Math.random()<0.025){
                        const ang = Math.random()*Math.PI*2;
                        targetX = head.x + Math.cos(ang)*300;
                        targetY = head.y + Math.sin(ang)*300;
                    }
                }

                // 修正朝向
                const dx = targetX - head.x;
                const dy = targetY - head.y;
                const d = Math.hypot(dx, dy);
                if(d>0.1){
                    this.direction.x = dx/d;
                    this.direction.y = dy/d;
                }
            }

            // 绘制：世界坐标转屏幕坐标（加上相机偏移）
            draw() {
                ctx.fillStyle = this.color;
                this.segments.forEach((seg, idx) => {
                    const sx = seg.x - gameState.camX;
                    const sy = seg.y - gameState.camY;
                    if (idx === 0) {
                        ctx.beginPath();
                        ctx.arc(sx, sy, config.gridSize/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        const half = config.gridSize/2;
                        ctx.fillRect(sx-half, sy-half, config.gridSize, config.gridSize);
                    }
                });
            }

            checkCollision(otherSnake) {
                const head = this.segments[0];
                return otherSnake.segments.some((seg, idx) =>
                    idx > 0 && Math.abs(head.x - seg.x) < config.gridSize/1.3 && Math.abs(head.y - seg.y) < config.gridSize/1.3
                );
            }

            createFoodFromDeath() {
                const foods = [];
                const foodNum = Math.floor(this.segments.length / 2);
                for (let i = 0; i < foodNum; i++) {
                    const seg = this.segments[Math.floor(Math.random() * this.segments.length)];
                    foods.push({x:seg.x,y:seg.y,color:this.color});
                }
                return foods;
            }

            addGrow() {
                this.growQueue += 1;
            }
        }

        // 初始化游戏
        function initGame() {
            gameState.isGameOver = false;
            gameState.killedCount = 0;
            // 玩家出生在大世界中心
            const worldCenterX = WORLD_W / 2;
            const worldCenterY = WORLD_H / 2;
            gameState.player = new Snake(worldCenterX, worldCenterY, config.playerColor, true);
            gameState.aiSnakes = [];

            // 生成AI，分散在超大地图各处
            for (let i = 0; i < config.baseAiCount; i++) {
                let x = Math.random()*(WORLD_W-200)+100;
                let y = Math.random()*(WORLD_H-200)+100;
                gameState.aiSnakes.push(new Snake(x,y,config.aiColors[i%config.aiColors.length]));
            }
            gameState.foods = [];
            spawnFoodOutsideView();
            updateScorePanel();
            gameOverModal.style.display = 'none';
        }

        // 在屏幕可视区外生成食物（世界坐标）
        function spawnFoodOutsideView() {
            const need = config.foodCount - gameState.foods.length;
            for(let i=0;i<need;i++){
                let x,y;
                const side = Math.floor(Math.random()*4);
                const pad = 120;
                switch(side){
                    case 0:x=gameState.camX-pad; y=Math.random()*WORLD_H;break;
                    case 1:x=gameState.camX+canvas.width+pad; y=Math.random()*WORLD_H;break;
                    case 2:y=gameState.camY-pad; x=Math.random()*WORLD_W;break;
                    case 3:y=gameState.camY+canvas.height+pad; x=Math.random()*WORLD_W;break;
                }
                // 限制在大世界范围内
                x=Math.max(10,Math.min(WORLD_W-10,x));
                y=Math.max(10,Math.min(WORLD_H-10,y));
                gameState.foods.push({x,y,color:config.aiColors[Math.floor(Math.random()*config.aiColors.length)]});
            }
        }

        // 绘制食物
        function drawFoods() {
            gameState.foods.forEach(f=>{
                const sx = f.x-gameState.camX;
                const sy = f.y-gameState.camY;
                ctx.fillStyle=f.color;
                ctx.beginPath();
                ctx.arc(sx,sy,4,0,Math.PI*2);
                ctx.fill();
            })
        }

        // 吃食物判定
        function checkEatFood(snake) {
            const hd = snake.segments[0];
            for(let i=gameState.foods.length-1;i>=0;i--){
                const fd = gameState.foods[i];
                if(Math.hypot(hd.x-fd.x,hd.y-fd.y)<config.gridSize){
                    gameState.foods.splice(i,1);
                    snake.addGrow();
                    spawnFoodOutsideView();
                    return true;
                }
            }
            return false;
        }

        function updateScorePanel() {
            scorePanel.textContent = `击杀: ${gameState.killedCount} | 长度: ${gameState.player.segments.length}`;
        }

        function gameOver() {
            gameState.isGameOver = true;
            finalStats.textContent = `击杀: ${gameState.killedCount} | 长度: ${gameState.player.segments.length}`;
            gameOverModal.style.display = 'block';
        }

        let animId;
        function gameLoop() {
            if(gameState.isGameOver) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // ==========动态相机：保持玩家蛇头永远在屏幕中心
            const playerHead = gameState.player.segments[0];
            gameState.camX = playerHead.x - canvas.width/2;
            gameState.camY = playerHead.y - canvas.height/2;

            // 全体蛇列表，给AI做智能寻路用
            const allSnakeList = [gameState.player, ...gameState.aiSnakes];

            // 更新玩家
            gameState.player.move(allSnakeList, gameState.foods, gameState.player);
            checkEatFood(gameState.player);
            gameState.player.draw();

            // 更新AI
            for(let i=gameState.aiSnakes.length-1;i>=0;i--){
                const ai = gameState.aiSnakes[i];
                ai.move(allSnakeList, gameState.foods, gameState.player);
                checkEatFood(ai);
                ai.draw();

                // 玩家撞AI死亡
                if(gameState.player.checkCollision(ai)){
                    gameOver();
                }
                // AI撞到玩家身体 → AI死亡变食物
                if(ai.checkCollision(gameState.player)){
                    const deadFood = ai.createFoodFromDeath();
                    gameState.foods.push(...deadFood);
                    gameState.aiSnakes.splice(i,1);
                    gameState.killedCount++;
                    updateScorePanel();
                    // 延时在大地图随机刷新新AI
                    setTimeout(()=>{
                        if(!gameState.isGameOver){
                            let nx = Math.random()*(WORLD_W-300)+150;
                            let ny = Math.random()*(WORLD_H-300)+150;
                            gameState.aiSnakes.push(new Snake(nx,ny,config.aiColors[Math.floor(Math.random()*config.aiColors.length)]))
                        }
                    },900)
                }
            }
            drawFoods();
            animId = requestAnimationFrame(gameLoop);
        }

        // 鼠标移动
        canvas.addEventListener('mousemove',e=>{
            const rc = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rc.left;
            gameState.mouseY = e.clientY - rc.top;
        })

        // 明暗切换
        themeBtn.onclick = ()=>{
            gameState.isDark = !gameState.isDark;
            document.body.classList.toggle('dark');
            themeBtn.textContent = gameState.isDark ? '☀️ 明亮模式' : '🌙 暗黑模式';
        }

        // 难度配置修改AI参数
        difficultySelect.onchange = e=>{
            const val = e.target.value;
            if(val === 'easy'){
                config.aiSpeed=1.5;
                config.baseAiCount=4;
                config.aiChasePlayerRate=0.12;
                config.aiChaseOtherRate=0.08;
            }else if(val === 'normal'){
                config.aiSpeed=1.9;
                config.baseAiCount=6;
                config.aiChasePlayerRate=0.28;
                config.aiChaseOtherRate=0.18;
            }else{
                config.aiSpeed=2.3;
                config.baseAiCount=9;
                config.aiChasePlayerRate=0.42;
                config.aiChaseOtherRate=0.30;
            }
            initGame();
        }

        // 重启
        restartBtn.onclick = ()=>{
            cancelAnimationFrame(animId);
            initGame();
            gameLoop();
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
